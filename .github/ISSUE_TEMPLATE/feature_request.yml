name: Feature Request
about: Suggest an improvement or new capability
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Need
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Other options considered
    validations:
      required: false
